<!DOCTYPE html>
<html>
<head>
<title>Uji coba TKA</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,GREEN,Yellow);
margin:0;
padding:0;
text-align:center;
}

.container{
background:white;
max-width:900px;
margin:40px auto;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
color:#333;
}

#timer{
font-size:28px;
font-weight:bold;
color:red;
margin:15px;
}

button{
padding:12px 25px;
font-size:16px;
border:none;
border-radius:8px;
background:#4facfe;
color:white;
cursor:pointer;
}

button:hover{
background:#2c8ef4;
}

iframe{
width:100%;
height:650px;
border:none;
border-radius:10px;
display:none;
}

</style>
</head>

<body>

<div class="container">

<h1>Uji Asesmen Tes Kemampuan Akademik</h1>

<p>Silakan isi username dan password lalu tekan tombol login ujian.</p>

<input type="text" id="nama" placeholder="Username" style="padding:10px;width:60%;margin:10px">

<input type="text" id="nama" placeholder="Password" style="padding:10px;width:60%;margin:10px">

<input type="text" id="nama" placeholder="School" style="padding:10px;width:60%;margin:10px"

<br><br>

<button onclick="mulaiUjian()">Login</button>

<h2>Sisa Waktu</h2>

<div id="timer">30:00</div>

<iframe id="formUjian"
src="https://forms.gle/4W9Jes5Ht6suCDpz6"></iframe>

</div>

<script>

let waktu = 1800
let timerAktif = false

function mulaiUjian(){

let nama = document.getElementById("nama").value

if(nama == ""){
alert("Masukkan Username dan Password!")
return
}

document.getElementById("formUjian").style.display = "block"

if(!timerAktif){
setInterval(timer,1000)
timerAktif = true
}

}

function timer(){

let menit = Math.floor(waktu/60)
let detik = waktu % 60

if(detik < 10){
detik = "0"+detik
}

document.getElementById("timer").innerHTML =
menit + ":" + detik

waktu--

if(waktu < 0){
alert("Waktu ujian habis!")
location.reload()
}

}

</script>

</body>
</html>
